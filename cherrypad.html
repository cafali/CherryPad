<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CherryPad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/cherrypad.css">
</head>
<body>

<div class="logo-container">
    <img id="logo-image" src="icon/CherryPad.png" alt="CherryPad Logo">
    <span>CherryPad</span>
</div>    

<!-- TOP BUTTONS -->
<div class="buttons-container"> 
        <button id="saveButton" class="button"><i class="fas fa-save"></i>Save</button>
        <button id="DownloadButton" class="button"><i class="fas fa-file-download"></i>Download</button>
        <button id="copyButton" class="button"><i class="fas fa-copy"></i>Copy All</button>
        <button id="pasteButton" class="button"><i class="fas fa-paste"></i>Paste</button>
        <button id="emojiButton" class="button"><i class="fas fa-smile"></i>Emoji</button>
        <button id="clearButton" class="button"><i class="fas fa-eraser"></i>Note 1</button>
        <button id="clearButton2" class="button"><i class="fas fa-eraser"></i>Note 2</button>
        <button id="privacyButton" class="button"><i class="fa-solid fa-eye"></i></button>
    </div>
    <div class="container">
        <div class="textarea-wrapper">
            <textarea id="noteInput" placeholder="Write your note here..."></textarea>
            <i class="fa-solid fa-eye-slash privacy-overlay"></i>
        </div>
        <div class="textarea-wrapper">
            <textarea id="noteInput2" placeholder="Hidden Note - This note won't appear in the popup... 
 
CherryPad Shortcuts: 

CTRL+S - Save Manually
CTRL+D - Download Note
CTRL+E - Open Emoji Panel

Enjoying CherryPad? Leave a rating on the Chrome Web Store!

...also make sure to find all the Easter Eggs!"></textarea>
<i class="fa-solid fa-eye-slash privacy-overlay"></i>
        </div>
    </div>
    <div class="footer">
        <div id="lastSaved" class="last-saved"></div>
        <div id="lastCopied" class="last-copied"></div>
        <div id="lastDownload" class="last-download"></div>
        <div id="lastPasted" class="last-pasted"></div>
        
        CherryPad Makes Note-Taking Easy<br>
        Button icons used in this project: Font Awesome (https://fontawesome.com), licensed under the Creative Commons Attribution 4.0 International License (CC BY 4.0)
    </div>
    <!-- Emoji Panel --> 
    <div id="emojiPanel" class="emoji-panel">
        <!-- ROW1 -->
        <button class="emoji">😊</button>
        <button class="emoji">😂</button>
        <button class="emoji">😍</button>
        <button class="emoji">😢</button>
        <button class="emoji">😎</button>
        <button class="emoji">😜</button>
        <button class="emoji">🥳</button>
        <button class="emoji">😇</button>
        <button class="emoji">😒</button><br>
        <!-- ROW2 -->
        <button class="emoji">😡</button>
        <button class="emoji">🤮</button>
        <button class="emoji">🤡</button>
        <button class="emoji">💩</button>
        <button class="emoji">💀</button>
        <button class="emoji">🎃</button>
        <button class="emoji">👽</button>
        <button class="emoji">🥶</button>
        <button class="emoji">😱</button><br>
        <!-- ROW3 -->
        <button class="emoji">👌</button>
        <button class="emoji">✋</button>
        <button class="emoji">👍</button>
        <button class="emoji">👎</button>
        <button class="emoji">👊</button>
        <button class="emoji">👏</button>
        <button class="emoji">👋</button>
        <button class="emoji">🤙</button>
        <button class="emoji">🤞</button><br>
        <!-- ROW4 -->
        <button class="emoji">✅</button>
        <button class="emoji">⚠️</button>
        <button class="emoji">❌</button>
        <button class="emoji">🟢</button>
        <button class="emoji">🟡</button>
        <button class="emoji">🔴</button>
        <button class="emoji">💚</button>
        <button class="emoji">💛</button>
        <button class="emoji">❤️</button><br>
        <!-- ROW5 -->
        <button class="emoji">💡</button>
        <button class="emoji">💥</button>
        <button class="emoji">🔥</button>
        <button class="emoji">⚡</button>
        <button class="emoji">🔍</button>
        <button class="emoji">📞</button>
        <button class="emoji">💲</button>
        <button class="emoji">🚀</button>
        <button class="emoji">🧠</button><br>
        <!-- ROW6 -->
        <button class="emoji">🕒</button>
        <button class="emoji">🌟</button>
        <button class="emoji">💬</button>
        <button class="emoji">📢</button>
        <button class="emoji">🔔</button>
        <button class="emoji">❓</button>
        <button class="emoji">👀</button>
        <button class="emoji">📌</button>
        <button class="emoji">🚨</button><br>
        <!-- ROW7 -->
        <button class="emoji">💻</button>
        <button class="emoji">🛡️</button>
        <button class="emoji">🔒</button>
        <button class="emoji">🗝️</button>
        <button class="emoji">⚙️</button>
        <button class="emoji">🐧</button>
        <button class="emoji">🍪</button>
        <button class="emoji">🌐</button>
        <button class="emoji">🌍</button><br>
        <!-- ROW8 -->
        <button class="emoji">🍒</button>
        <button class="emoji">🌸</button>
        <button class="emoji">🍌</button>
        <button class="emoji">🍆</button>
        <button class="emoji">🍑</button>
        <button class="emoji">🍓</button>
        <button class="emoji">🍉</button>
        <button class="emoji">🍇</button>
        <button class="emoji">🌶️</button><br>
        <!-- ROW9 -->        
        <button class="emoji">💎</button>
        <button class="emoji">👑</button>
        <button class="emoji">🥂</button>
        <button class="emoji">👜</button>
        <button class="emoji">👠</button>
        <button class="emoji">🍧</button>
        <button class="emoji">🏖️</button>
        <button class="emoji">🛥️</button>
        <button class="emoji">🌴</button><br>
        <!-- ROW10 -->        
        <button class="emoji">🐸</button>
        <button class="emoji">🎉</button>
        <button class="emoji">🎈</button>
        <button class="emoji">💦</button>
        <button class="emoji">👻</button>
        <button class="emoji">🌈</button>
        <button class="emoji">🎀</button>
        <button class="emoji">🐳</button>
        <button class="emoji">🍄</button><br>
</div>

</body>
</html>
<!-- Bottom Buttons --> 
<button id="versionButton" class="button version-button"><i class="fa fa-microchip"></i>1.6.2</button>
<button id="GithubButton" class="button github-button"><i class="fa-brands fa-github"></i>GitHub</button>
<button id="WebStoreButton" class="button WebStore-button"><i class="fa-brands fa-chrome"></i>Web Store</button>
<button id="AboutButton" class="button About-button"><i class="fa fa-info-circle"></i>About</button>


<script src="scripts/cherry.js"></script>
